<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헬로미추 수채화 컬러링 체험</title>
<meta name="description" content="헬로미추 수채화 컬러링키트 체험 신청 - 2026 두레미마켓">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #2a2118;
    --ink-soft: #5a4e42;
    --paper: #faf7f2;
    --brush-teal: #4a9c8c;
    --brush-amber: #d4843a;
    --brush-blue: #5a7eb8;
    --brush-pink: #c87878;
  }

  html, body {
    min-height: 100%;
    background: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100svh;
    padding: 2rem 1.5rem 3rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(74,156,140,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 85% 80%, rgba(90,126,184,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 70% 15%, rgba(212,132,58,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    max-width: 400px;
    width: 100%;
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .splash {
    display: block;
    width: 110px;
    height: 110px;
    margin: 0 auto 0.5rem;
    object-fit: contain;
    animation: floatUp 3s ease-in-out infinite;
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-6px); }
  }

  .brand-wrap { margin-bottom: 0.3rem; }

  .brand {
    display: block;
    width: auto;
    max-width: 560px;
    height: 4.8rem;
    margin: 0 auto;
    object-fit: contain;
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--ink-soft);
    font-weight: 300;
    letter-spacing: 0.08em;
    margin-bottom: 1.6rem;
  }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.4rem;
    background: white;
    border: 1px solid rgba(74,156,140,0.2);
    border-radius: 12px;
    padding: 0.3rem;
  }

  .tab-btn {
    flex: 1;
    padding: 0.55rem 0;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--ink-soft);
    transition: all 0.2s ease;
  }

  .tab-btn.active {
    background: var(--brush-teal);
    color: white;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── 예약/설문 패널 ── */
  .event-info {
    background: white;
    border: 1px solid rgba(74,156,140,0.2);
    border-radius: 16px;
    padding: 1.4rem 1.6rem;
    margin-bottom: 1.4rem;
    text-align: left;
  }

  .event-row {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    margin-bottom: 0.55rem;
  }

  .event-row:last-child { margin-bottom: 0; }

  .event-label {
    font-size: 0.72rem;
    color: var(--brush-teal);
    font-weight: 500;
    letter-spacing: 0.06em;
    min-width: 40px;
  }

  .event-value {
    font-size: 0.9rem;
    color: var(--ink);
    font-weight: 400;
  }

  .cta-btn {
    display: block;
    width: 100%;
    padding: 1rem 1.5rem;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.15s ease;
    margin-bottom: 0.8rem;
  }

  .cta-btn:hover { transform: translateY(-1px); }
  .cta-btn:active { transform: translateY(0); }

  .cta-btn--reserve { background: #3d8a7a; color: white; }
  .cta-btn--reserve:hover { background: #347a6c; }
  .cta-btn--survey { background: #f5aebc; color: var(--ink); }
  .cta-btn--survey:hover { background: #eca0b0; }

  .note {
    font-size: 0.75rem;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  .note strong { color: var(--brush-amber); font-weight: 500; }

  /* ── 현황 패널 ── */
  .status-panel {
    text-align: left;
  }

  .status-date-label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--brush-teal);
    letter-spacing: 0.06em;
    margin-bottom: 0.6rem;
    padding-left: 0.2rem;
  }

  .status-summary {
    background: white;
    border: 1px solid rgba(74,156,140,0.2);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .summary-text {
    font-size: 0.82rem;
    color: var(--ink-soft);
  }

  .summary-num {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--brush-teal);
  }

  .summary-num span {
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--ink-soft);
  }

  .slot-list {
    background: white;
    border: 1px solid rgba(74,156,140,0.2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.2rem;
  }

  .slot-row {
    display: flex;
    align-items: center;
    padding: 0.7rem 1.2rem;
    border-bottom: 1px solid rgba(74,156,140,0.08);
    transition: background 0.1s;
  }

  .slot-row:last-child { border-bottom: none; }

  .slot-row.past {
    opacity: 0.35;
  }

  .slot-time {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--ink);
    min-width: 52px;
  }

  .slot-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(74,156,140,0.1);
    border-radius: 3px;
    margin: 0 0.8rem;
    overflow: hidden;
  }

  .slot-bar {
    height: 100%;
    border-radius: 3px;
    background: var(--brush-teal);
    transition: width 0.4s ease;
  }

  .slot-bar.full { background: var(--brush-pink); }

  .slot-remain {
    font-size: 0.82rem;
    font-weight: 500;
    min-width: 48px;
    text-align: right;
  }

  .slot-remain.ok { color: var(--brush-teal); }
  .slot-remain.low { color: var(--brush-amber); }
  .slot-remain.full { color: var(--brush-pink); }

  .status-loading {
    text-align: center;
    padding: 2rem;
    color: var(--ink-soft);
    font-size: 0.85rem;
  }

  .status-updated {
    font-size: 0.7rem;
    color: rgba(90,78,66,0.4);
    text-align: right;
    margin-top: 0.3rem;
  }

  .footer {
    margin-top: 2rem;
    font-size: 0.7rem;
    color: rgba(90,78,66,0.45);
    letter-spacing: 0.04em;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">

  <img src="img/logo1.png" class="splash" alt="헬로미추 일러스트">

  <h1 class="brand-wrap">
    <img src="img/logo2.png" class="brand" alt="헬로미추">
  </h1>
  <p class="tagline">2026 두레미마켓 수채화 컬러링키트 체험</p>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('reserve')">예약 · 설문</button>
    <button class="tab-btn" onclick="switchTab('status')">예약 현황</button>
  </div>

  <!-- 예약/설문 패널 -->
  <div class="tab-panel active" id="panel-reserve">
    <div class="event-info">
      <div class="event-row">
        <span class="event-label">일시</span>
        <span class="event-value">2026. 5. 30(토) — 31(일)</span>
      </div>
      <div class="event-row">
        <span class="event-label">장소</span>
        <span class="event-value">안녕인사동 1층 잔디광장</span>
      </div>
      <div class="event-row">
        <span class="event-label">운영</span>
        <span class="event-value">11:00 — 19:40 · 20분 단위 예약</span>
      </div>
      <div class="event-row">
        <span class="event-label">참가</span>
        <span class="event-value">무료 체험 · 선착순 예약</span>
      </div>
    </div>

    <a class="cta-btn cta-btn--reserve" href="https://forms.gle/m1RxTFzPX1DFLZa99">
      체험 예약하기
    </a>
    <a class="cta-btn cta-btn--survey" href="https://forms.gle/6zvFrtLxtGFNfUJ88">
      설문 참가하기
    </a>

    <p class="note">
      예약 후 <strong>SMS로 확인 메시지</strong>가 발송됩니다.<br>
      체험 후 설문 참여 시 <strong>뽑기 이벤트</strong> 참여 가능해요.
    </p>
  </div>

  <!-- 현황 패널 -->
  <div class="tab-panel" id="panel-status">
    <div class="status-panel">
      <div id="statusContent">
        <div class="status-loading">잔여 현황을 불러오는 중...</div>
      </div>
      <p class="status-updated" id="updatedAt"></p>
    </div>
  </div>

</div>

<p class="footer">주식회사 헬로미추 · Hello Michu 2026</p>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwIl5ahXaZ_hkitvDbqqtK9kwDvxEjFGgzc-sShRJJyhsliAiZq1-bpUfMcEh3KZJaN/exec';

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0) === (tab === 'reserve'));
  });
  document.getElementById('panel-reserve').classList.toggle('active', tab === 'reserve');
  document.getElementById('panel-status').classList.toggle('active', tab === 'status');
  if (tab === 'status') loadStatus();
}

// ── 현재 날짜 판단 ──
function getTodayDateStr() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const day = now.getDay();
  const days = ['일','월','화','수','목','금','토'];
  return `${m}월 ${d}일 (${days[day]})`;
}

// ── 시간 지났는지 판단 ──
function isPast(timeStr) {
  const now = new Date();
  const [h, m] = timeStr.split(':').map(Number);
  return now.getHours() > h || (now.getHours() === h && now.getMinutes() > m + 20);
}

// ── 현황 렌더링 ──
function renderStatus(slots) {
  const today = getTodayDateStr();
  const eventDates = ['5월 30일 (토)', '5월 31일 (일)'];

  // 행사 기간 이전이면 첫째날, 이후면 마지막날 고정
  let activeDate = eventDates[0];
  if (today === eventDates[1]) activeDate = eventDates[1];
  else if (today !== eventDates[0]) {
    const now = new Date();
    const event2 = new Date('2026-05-31');
    activeDate = now > event2 ? eventDates[1] : eventDates[0];
  }

  // 날짜별로 분리
  const byDate = {};
  eventDates.forEach(d => { byDate[d] = []; });
  slots.forEach(s => {
    if (byDate[s.date]) byDate[s.date].push(s);
  });

  let html = '';
  eventDates.forEach(date => {
    const isActive = date === activeDate;
    if (!isActive) return; // 오늘 날짜만 표시

    const dateSlots = byDate[date] || [];
    // 지나간 슬롯 제외
    const futureSlots = dateSlots.filter(s => !isPast(s.time));
    const totalRemain = futureSlots.reduce((a, s) => a + Math.max(0, s.remain), 0);

    html += `<p class="status-date-label">${date}</p>`;
    html += `
      <div class="status-summary">
        <span class="summary-text">현재 예약 가능</span>
        <span class="summary-num">${totalRemain}<span>석 남음</span></span>
      </div>
    `;
    html += `<div class="slot-list">`;

    dateSlots.forEach(s => {
      const past = isPast(s.time);
      const remain = Math.max(0, s.remain);
      const pct = Math.round((3 - remain) / 3 * 100);
      const isFull = remain === 0;
      const isLow = remain === 1;

      let remainLabel = '';
      let remainClass = '';
      if (past) {
        remainLabel = '종료';
        remainClass = '';
      } else if (isFull) {
        remainLabel = '종료 · 0석';
        remainClass = 'full';
      } else if (isLow) {
        remainLabel = '1석 남음';
        remainClass = 'low';
      } else {
        remainLabel = `${remain}석 남음`;
        remainClass = 'ok';
      }

      html += `
        <div class="slot-row ${past ? 'past' : ''}">
          <span class="slot-time">${s.time}</span>
          <div class="slot-bar-wrap">
            <div class="slot-bar ${(isFull || past) ? 'full' : ''}" style="width:${past ? 100 : pct}%"></div>
          </div>
          <span class="slot-remain ${remainClass}">${remainLabel}</span>
        </div>
      `;
    });

    html += `</div>`;
  });

  document.getElementById('statusContent').innerHTML = html;

  const now = new Date();
  document.getElementById('updatedAt').textContent =
    `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 기준`;
}

// ── API 호출 ──
function loadStatus() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => renderStatus(data.slots))
    .catch(() => {
      document.getElementById('statusContent').innerHTML =
        '<div class="status-loading">현황을 불러오지 못했어요.<br>잠시 후 다시 시도해주세요.</div>';
    });
}
</script>

</body>
</html>
