
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0 2rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:12px;flex-wrap:wrap}
.title-block{display:flex;flex-direction:column;gap:3px}
.title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.subtitle{font-size:13px;color:var(--color-text-secondary)}
.stats{display:flex;gap:8px;align-items:center}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:6px 14px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:58px}
.stat-num{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-label{font-size:11px;color:var(--color-text-secondary)}
.stat-num.done{color:var(--color-text-success)}
.progress-bar{width:100%;height:5px;background:var(--color-border-tertiary);border-radius:99px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:99px;transition:width .3s}
.section{margin-bottom:1.25rem}
.section-header{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:4px;cursor:pointer;user-select:none}
.section-icon{font-size:16px;color:var(--color-text-secondary)}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1}
.section-count{font-size:12px;color:var(--color-text-secondary)}
.section-chevron{font-size:14px;color:var(--color-text-tertiary);transition:transform .2s}
.section-chevron.open{transform:rotate(180deg)}
.items{display:flex;flex-direction:column;gap:2px}
.item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid transparent;transition:background .12s}
.item:hover{background:var(--color-background-secondary)}
.item.checked{opacity:.55}
.item.urgent{border-color:var(--color-border-warning)}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background .12s,border-color .12s}
.check-box.on{background:#1D9E75;border-color:#1D9E75}
.item-body{display:flex;flex-direction:column;gap:2px;flex:1}
.item-label{font-size:14px;color:var(--color-text-primary);line-height:1.4}
.item.checked .item-label{text-decoration:line-through;color:var(--color-text-tertiary)}
.item-note{font-size:12px;color:var(--color-text-secondary);line-height:1.4}
.item.checked .item-note{color:var(--color-text-tertiary)}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 7px;border-radius:99px;margin-left:6px;vertical-align:middle}
.badge-urgent{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-photo{background:var(--color-background-info);color:var(--color-text-info)}
.badge-check{background:var(--color-background-success);color:var(--color-text-success)}
.reset-btn{font-size:13px;color:var(--color-text-secondary);cursor:pointer;background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 12px}
.reset-btn:hover{background:var(--color-background-secondary)}
.day-tabs{display:flex;gap:6px;margin-bottom:1rem}
.day-tab{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:var(--color-background-primary)}
.day-tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
</style>

<div class="wrap">
  <h2 class="sr-only">두레미마켓 준비물 체크리스트 — 항목을 클릭해서 완료 표시</h2>

  <div class="top-bar">
    <div class="title-block">
      <div class="title">두레미마켓 준비물 체크리스트</div>
      <div class="subtitle">2026.5.30(토) ~ 31(일) · 안녕 인사동 1층 잔디광장</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="stats">
        <div class="stat"><span class="stat-num done" id="cnt-done">0</span><span class="stat-label">완료</span></div>
        <div class="stat"><span class="stat-num" id="cnt-total">0</span><span class="stat-label">전체</span></div>
      </div>
      <button class="reset-btn" onclick="resetAll()">초기화</button>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="list"></div>
</div>

<script>
const DATA = [
  {
    id:'doc', icon:'ti-file-description', title:'서류·증빙', color:'',
    items:[
      {id:'d1', label:'파일럿사업 신청서 출력본', note:'승인번호 확인 후 지참', urgent:true},
      {id:'d2', label:'참석자 명단 양식', note:'현장 서명 받을 용지 여러 장'},
      {id:'d3', label:'설문조사지 (백업용 인쇄본)', note:'QR 안 될 경우 대비'},
      {id:'d4', label:'오마인스튜디오 사업자등록증 사본', note:'혹시 현장 제출 요청 대비', urgent:true},
      {id:'d5', label:'법인카드 (관광두레)', note:'유류비·식비·소모품 결제용'},
      {id:'d6', label:'톨게이트 영수증 보관봉투', note:'고속도로 통행료 필수 수거'},
      {id:'d7', label:'개인정보 수집·활용 동의서', note:'교통비 원천징수 청구용'},
      {id:'d8', label:'청구 및 계좌입금 의뢰서', note:''},
    ]
  },
  {
    id:'material', icon:'ti-palette', title:'체험 재료', color:'',
    items:[
      {id:'m1', label:'수채화물감 44색 × 5세트', note:'튜브 1개로 팔레트 2개 — 출발 전 세팅 확인', urgent:true},
      {id:'m2', label:'체험용 수채화지 (콩기름잉크 인쇄) × 156장+여유분', note:'앞면 도안 / 뒷면 엽서+두레로고 인쇄 확인'},
      {id:'m3', label:'세필붓 세트 × 3세트', note:'체험 1인당 1세트'},
      {id:'m4', label:'접이식물통 × 6개', note:'1인당 2개 사용'},
      {id:'m5', label:'마스킹테이프 × 3개', note:'수채화지 고정용'},
      {id:'m6', label:'키친타올 (코스트코 12롤)', note:'물 조절·세척용'},
      {id:'m7', label:'물티슈 (100매 10팩)', note:'세척·정리용'},
      {id:'m8', label:'바인더형팔레트 (전시용·체험시연용)', note:'사업비 아님 — 대표 자체 지참', photo:true},
      {id:'m9', label:'종이바인더 (전시용)', note:'사업비 아님 — 대표 자체 지참', photo:true},
    ]
  },
  {
    id:'event', icon:'ti-gift', title:'이벤트 경품', color:'',
    items:[
      {id:'e1', label:'액자 × 40개', note:'SNS 후기 조건 증정용 — 사이즈·수량 사전 확인', urgent:true},
      {id:'e2', label:'뽑기통 + 뽑기 제비 세트', note:'설문 참여자 전원 1회 — 1등 수채화 다이어리'},
      {id:'e3', label:'수채화 다이어리 1등 경품', note:'뽑기 당첨 1명 — 포장 완료 상태로 지참'},
    ]
  },
  {
    id:'display', icon:'ti-layout-board', title:'홍보·부스 설치', color:'',
    items:[
      {id:'b1', label:'이벤트 풍선 (무료체험 문구)', note:'부스 인근 설치 — 관광두레 로고 포함 확인', photo:true, urgent:true},
      {id:'b2', label:'부스 가로배너 × 1개', note:'관광두레 로고 삽입 확인 — 설치 현장사진 필수', photo:true},
      {id:'b3', label:'미니배너 × 2개', note:'QR코드 인쇄 확인 (예약 QR·설문 QR)'},
      {id:'b4', label:'QR코드 출력본 (예비용)', note:'배너 파손·분실 대비 A4 출력'},
      {id:'b5', label:'테이블 클램프 or 배너 스탠드', note:'매대 높이 조절 불가 시 보조 고정 도구'},
    ]
  },
  {
    id:'ops', icon:'ti-settings', title:'운영·기록', color:'',
    items:[
      {id:'o1', label:'구글폼 QR 최종 작동 확인', note:'예약폼 + 설문폼 각각 스캔 테스트', urgent:true},
      {id:'o2', label:'스마트폰 보조배터리 × 2개', note:'QR 스캔·사진 촬영 종일 사용'},
      {id:'o3', label:'핸드폰 거치대 or 미니 삼각대', note:'설문 QR 고정 + 단체사진 타이머용'},
      {id:'o4', label:'운영 타임테이블 출력본', note:'11:00~19:40 26타임 회차표 — 예약 현황 수기 백업'},
      {id:'o5', label:'다과 (음료·간식)', note:'1인 5,000원 기준 — 회의록 작성 필수 (운영비 청구)', urgent:true},
      {id:'o6', label:'현금 소액 (잔돈)', note:'현장 돌발 상황 대비'},
    ]
  },
  {
    id:'photo', icon:'ti-camera', title:'사진 촬영 체크', color:'',
    items:[
      {id:'p1', label:'출발 전 — 재료별 구매사진', note:'물감·붓·물통·테이프·키친타올·물티슈 각각 개별 촬영', photo:true, urgent:true},
      {id:'p2', label:'설치 후 — 풍선·배너 현장설치 사진', note:'관광두레 로고 식별 가능한 크기로', photo:true, urgent:true},
      {id:'p3', label:'세팅 후 — 테이블 전체 세팅 실물사진 5장 이상', note:'물감·붓·물통·수채화지 펼쳐놓은 상태', photo:true},
      {id:'p4', label:'회차별 — 운영진 전원 단체사진 1장 이상/일', note:'이영지+김정숙+PD 얼굴 식별 가능하게', photo:true, urgent:true},
      {id:'p5', label:'회차별 — 체험 진행 장면', note:'붓 들고 채색하는 모습, 물감 팔레트 포함'},
      {id:'p6', label:'회차별 — QR 설문 작성 장면', note:'참여자 스마트폰 화면 보이도록'},
      {id:'p7', label:'SNS 후기 확인 + 액자 증정 장면', note:'현장 확인 후 즉석 증정 사진'},
      {id:'p8', label:'완성 작품 사진', note:'액자에 넣은 상태 포함'},
    ]
  },
  {
    id:'move', icon:'ti-car', title:'이동·숙박', color:'',
    items:[
      {id:'v1', label:'출발 전 네이버 길찾기 캡처', note:'미추홀 사업장 → 안녕인사동 → 숙박지 경로 — 유류비 산출근거', urgent:true},
      {id:'v2', label:'톨게이트 영수증 수거 (편도 1,800원)', note:'고속도로 사용 시 왕복 전부 수거'},
      {id:'v3', label:'숙박 예약 확인 (1인 80,000원 한도)', note:'두레미마켓 10만원 지원 여부 확인 후 이중지원 방지', urgent:true},
      {id:'v4', label:'식비 영수증 수거', note:'1식 10,000원 한도 / 주류·주점 포함 영수증 사용 불가'},
    ]
  },
  {
    id:'after', icon:'ti-clipboard-check', title:'행사 후 결과보고 준비', color:'',
    items:[
      {id:'a1', label:'설문 응답 데이터 저장 (구글폼)', note:'결과보고서 첨부용 — 156건 이상 목표'},
      {id:'a2', label:'참석자 명단 서명 완료본 수거', note:'참여 구성원 + PD 전원'},
      {id:'a3', label:'영수증 항목별 정리', note:'법인카드 전표 / 세금계산서 / 톨게이트 / 식비'},
      {id:'a4', label:'현장사진 원본 백업', note:'구글포토 or 드라이브 업로드 — 원본 삭제 금지'},
      {id:'a5', label:'결과보고서 제출 기한 확인', note:'행사 종료 후 2주 이내 (6.13 제출예정일)', urgent:true},
    ]
  },
];

const KEY = 'dureumi_checklist_v1';
let state = {};
try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { state = {}; }

function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

function toggle(id){
  state[id] = !state[id];
  save();
  render();
}

function resetAll(){
  state = {};
  save();
  render();
}

function render(){
  const list = document.getElementById('list');
  let totalItems = 0, doneItems = 0;

  list.innerHTML = DATA.map(sec => {
    const secDone = sec.items.filter(i => state[i.id]).length;
    const secTotal = sec.items.length;
    totalItems += secTotal;
    doneItems += secDone;

    const itemsHtml = sec.items.map(item => {
      const on = !!state[item.id];
      return `<div class="item${on?' checked':''}${item.urgent?' urgent':''}" onclick="toggle('${item.id}')">
        <div class="check-box${on?' on':''}">
          ${on ? '<i class="ti ti-check" style="font-size:12px;color:#fff" aria-hidden="true"></i>' : ''}
        </div>
        <div class="item-body">
          <div class="item-label">${item.label}${item.urgent ? '<span class="badge badge-urgent">필수</span>' : ''}${item.photo ? '<span class="badge badge-photo">사진</span>' : ''}</div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    return `<div class="section">
      <div class="section-header">
        <i class="ti ${sec.icon} section-icon" aria-hidden="true"></i>
        <span class="section-title">${sec.title}</span>
        <span class="section-count">${secDone}/${secTotal}</span>
        <i class="ti ti-chevron-down section-chevron open" aria-hidden="true"></i>
      </div>
      <div class="items">${itemsHtml}</div>
    </div>`;
  }).join('');

  document.getElementById('cnt-done').textContent = doneItems;
  document.getElementById('cnt-total').textContent = totalItems;
  const pct = totalItems ? Math.round(doneItems / totalItems * 100) : 0;
  document.getElementById('prog').style.width = pct + '%';
}

render();
</script>
